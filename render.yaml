services:
  - type: web
    name: shokerefund-miniapp
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_improved_v6_violet_ice.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: WEB_HOST
        value: 0.0.0.0
      - key: WEB_PORT
        value: 10000
      - key: DB_PATH
        value: /data/shokerefund.db
      - key: PUBLIC_BASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: MAIN_ADMIN_ID
        sync: false
      - key: ADMIN_IDS_JSON
        sync: false
      - key: TEST_MODE
        value: false
      - key: SKIP_SUBSCRIPTION_CHECK
        value: false
      - key: SEND_STARTUP_MESSAGE
        value: true
    disks:
      - name: shokerefund-data
        mountPath: /data
        sizeGB: 1
